{% extends 'base.html' %}

{% block titulo %} Meu Perfil {% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <div class="card card-post pb-4 shadow border-0 rounded-4">
                <div class="profile-header mb-5 position-relative" style="height: 120px; background-color: rgb(0, 114, 187); border-radius: 15px 15px 0 0;">
                    <div class="position-absolute translate-middle bg-white rounded-circle d-flex justify-content-center align-items-center shadow" style="width: 120px; height: 120px; top: 100%; left: 50%; border: 4px solid white;">
                        <i class="bi bi-person text-seed-cinza" style="font-size: 4rem;"></i>
                    </div>
                </div>
                
                <div class="card-body text-center mt-4">
                    <h3 class="fw-bold text-seed-azul mb-1">{{ current_user.nome }} {{ current_user.sobrenome }}</h3>
                    <p class="text-muted mb-3 text-capitalize"><span class="badge bg-seed-verde">{{ current_user.perfil }}</span></p>
                    
                    <p class="text-seed-cinza fw-semibold"><i class="bi bi-envelope me-2"></i>{{ current_user.email }}</p>
                    
                    <div class="mt-4">
                        <button class="btn btn-seed-azul rounded-pill px-4 me-2" data-bs-toggle="modal" data-bs-target="#modalEditarPerfil">
                            Editar Perfil
                        </button>
                        <a href="{{ url_for('Logout') }}" class="btn btn-outline-danger rounded-pill px-4">Sair</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="modalEditarPerfil" tabindex="-1">
    <div class="modal-dialog">
        <form action="" method="post">
            <div class="modal-content rounded-4 border-0">
                <div class="modal-header bg-seed-cinza text-white">
                    <h5 class="modal-title">Editar Informações</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-seed-cinza fw-bold">Nome</label>
                        <input type="text" name="nome" class="form-control" value="{{ current_user.nome }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-seed-cinza fw-bold">Sobrenome</label>
                        <input type="text" name="sobrenome" class="form-control" value="{{ current_user.sobrenome }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-seed-cinza fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-seed-verde w-100 rounded-pill">Salvar Alterações</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
